<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pro - Formatter & Auto-Fix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 id="appTitle">Dev Tools</h1>
        <p class="subtitle" id="appSubtitle">Format, validate, and auto-fix data instantly.</p>
        <div class="header-actions">
            <button class="theme-btn" id="themeToggleBtn" type="button">Dark Mode</button>
        </div>
    </header>

    <div class="tool-picker" id="toolPicker">
        <div class="tool-picker-card">
            <div class="tool-picker-title">Choose your tool</div>
            <p class="tool-picker-subtitle">This is shown on your first visit. You can switch anytime from the left sidebar.</p>
            <div class="tool-picker-options">
                <button class="tool-choice" data-tool="json">
                    <strong>JSON Formatter</strong>
                    <span>Keep strict JSON formatting, validation, and auto-fix.</span>
                </button>
                <button class="tool-choice" data-tool="yaml">
                    <strong>YAML Formatter</strong>
                    <span>Format YAML and apply practical auto-fixes for common issues.</span>
                </button>
                <button class="tool-choice" data-tool="jwt">
                    <strong>JWT Token Decoder</strong>
                    <span>Decode header/payload, inspect expiry and claims quickly.</span>
                </button>
                <button class="tool-choice" data-tool="cron">
                    <strong>Cron Schedule Parser</strong>
                    <span>Validate cron expressions and preview upcoming run times.</span>
                </button>
                <button class="tool-choice" data-tool="timestamp">
                    <strong>Unix Timestamp Converter</strong>
                    <span>Convert Unix/ISO/local date values in both directions.</span>
                </button>
            </div>
        </div>
    </div>

    <div class="app-shell" id="appShell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-toggle-strip">
                <button class="sidebar-toggle-btn" id="sidebarToggleBtn" type="button" title="Toggle sidebar" aria-label="Toggle sidebar">
                    <svg class="icon-menu" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    <svg class="icon-panel" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
            </div>
            <div class="sidebar-content">
                <div class="sidebar-group">
                    <div class="sidebar-label">Formatters</div>
                    <button class="sidebar-tool" id="jsonToolBtn" type="button">JSON Formatter</button>
                    <button class="sidebar-tool" id="yamlToolBtn" type="button">YAML Formatter</button>
                </div>
                <div class="sidebar-group">
                    <div class="sidebar-label">Utilities</div>
                    <button class="sidebar-tool" id="jwtToolBtn" type="button">JWT Token Decoder</button>
                    <button class="sidebar-tool" id="cronToolBtn" type="button">Cron Schedule Parser</button>
                    <button class="sidebar-tool" id="timestampToolBtn" type="button">Unix Timestamp Converter</button>
                </div>
            </div>
        </aside>

        <div class="workspace">
            <div class="error-message" id="errorMessage">
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM0 8a8 8 0 1116 0A8 8 0 010 8z"/><path d="M7.25 5a.75.75 0 011.5 0V8a.75.75 0 01-1.5 0V5zM8 11a1 1 0 100-2 1 1 0 000 2z"/></svg>
                    <strong>Error:</strong> <span id="errorText"></span>
                </div>
                <div class="error-location" id="errorLocation"></div>
            </div>

            <div class="container">
                <div class="panel" id="leftPanel">
                    <div class="panel-header">
                        <span class="panel-title" id="inputPanelTitle">Input</span>
                        <div class="btn-group">
                            <button class="btn btn-secondary" type="button">Clear</button>
                            <button class="btn btn-secondary" id="autoFixBtn" type="button">Auto Fix</button>
                            <button class="btn btn-primary" id="primaryActionBtn" type="button">Format</button>
                        </div>
                    </div>
                    <div class="editor-wrapper">
                        <div class="line-numbers" id="inputLineNumbers">1</div>
                        <textarea id="inputJson" placeholder="Paste your data here..." spellcheck="false"></textarea>
                    </div>
                    <div class="input-error-inline" id="inputErrorInline"></div>
                </div>

                <div class="resizer" id="resizer">
                    <div class="resizer-handle"></div>
                </div>

                <div class="panel" id="rightPanel">
                    <div class="panel-header">
                        <span class="panel-title" id="outputPanelTitle">Output</span>
                        <button class="btn btn-secondary" type="button">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25v-7.5zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25h-7.5z"/></svg>
                            Copy
                        </button>
                    </div>
                    <div class="editor-wrapper">
                        <div class="output-area" id="outputArea">
                            <div id="outputContent"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
